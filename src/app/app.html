<nav>
  <a routerLink="/login">Login</a>
</nav>

<router-outlet />

<input type="search" placeholder="Search movies..." [(ngModel)]="query" />

@if (isLoading()) {
  <p>Loading...</p>
}

@if (error(); as err) {
  <p data-testid="error">Error: {{ err }}</p>
}

<ul>
  @for (movie of movies(); track movie.imdbID) {
    <li>
      <img [src]="movie.Poster" [alt]="movie.Title" width="80" />
      <span>{{ movie.Title }} ({{ movie.Year }})</span>
    </li>
  }
</ul>
